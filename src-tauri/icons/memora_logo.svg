<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <!-- Premium Dark Background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f111a" />
      <stop offset="100%" stop-color="#191b28" />
    </linearGradient>

    <!-- Main Accent Gradient -->
    <linearGradient id="primary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />    <!-- Blue -->
      <stop offset="50%" stop-color="#8b5cf6" />   <!-- Violet -->
      <stop offset="100%" stop-color="#ec4899" />  <!-- Pink -->
    </linearGradient>

    <!-- Secondary Accent Gradient -->
    <linearGradient id="secondary" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />    <!-- Cyan -->
      <stop offset="100%" stop-color="#3b82f6" />  <!-- Blue -->
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="40" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="20" stdDeviation="25" flood-opacity="0.4" flood-color="#000" />
    </filter>
  </defs>

  <!-- App Icon Squircle Background -->
  <rect width="1024" height="1024" rx="225" fill="url(#bg)" />
  <rect x="2" y="2" width="1020" height="1020" rx="223" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="4" />

  <!-- Ambient Background Glow -->
  <circle cx="512" cy="512" r="300" fill="url(#primary)" opacity="0.15" filter="url(#glow)"/>

  <g filter="url(#shadow)">
    <!-- Outer brain / memory circuit dashed ring -->
    <path d="M512,180 A 332,332 0 1,1 180,512 A 332,332 0 0,1 512,180" 
          fill="none" stroke="url(#secondary)" stroke-width="24" stroke-dasharray="100 80 300 120 40 60" stroke-linecap="round" opacity="0.6"/>

    <!-- The 'M' Lettermark for Memora -->
    <path d="M300,680 L300,380 L512,550 L724,380 L724,680" 
          fill="none" stroke="url(#primary)" stroke-width="64" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- AI / Memory Nodes at the top points -->
    <circle cx="300" cy="380" r="48" fill="#ffffff" />
    <circle cx="724" cy="380" r="48" fill="#ffffff" />
    
    <!-- Central Node removed as per user request -->


    <!-- Bottom Nodes tying it down -->
    <circle cx="300" cy="680" r="32" fill="url(#primary)" />
    <circle cx="724" cy="680" r="32" fill="url(#primary)" />
  </g>
</svg>
